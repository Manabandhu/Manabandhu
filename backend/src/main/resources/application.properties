spring.application.name=manabandhu-backend
server.port=9090

# Disable Spring Boot DevTools automatic restart
spring.devtools.restart.enabled=false

spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
# HikariCP configuration to handle cached plan issues
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000
# Disable prepared statement caching to avoid "cached plan must not change result type" errors
# prepareThreshold=0 disables server-side prepared statements
spring.datasource.hikari.data-source-properties.prepareThreshold=0
# Temporarily set to 'none' to allow Flyway migration to run first
# Change back to 'validate' after migration V12 is applied
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false
spring.flyway.repair-on-startup=true
# spring.flyway.enabled=false

spring.data.redis.url=${REDIS_URL:redis://localhost:6379}
spring.data.redis.ssl.enabled=true
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000

firebase.service-account=${FIREBASE_SERVICE_ACCOUNT:}

spring.cloud.gcp.enabled=true
spring.cloud.gcp.project-id=your-project-id
spring.cloud.gcp.credentials.location=file:./gcloud-service-key.json


jwt.secret=${JWT_SECRET:your-secret-key-change-this-in-production}
jwt.expiration=86400000

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

logging.level.com.manabandhu=INFO
logging.level.org.springframework.web=INFO
logging.level.org.flywaydb=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# USCIS Configuration
uscis.api.base-url=https://egov.uscis.gov
uscis.rate-limit.requests-per-minute=10

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
