spring.application.name=manabandhu-backend
server.port=9090

# Database Configuration
spring.devtools.restart.enabled=false
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway Migration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false
spring.flyway.repair-on-startup=true

# Redis Cache Configuration
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}
spring.data.redis.ssl.enabled=true
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000

# Authentication configuration

# JWT Configuration
jwt.secret=${JWT_SECRET:your-secret-key-change-this-in-production}
jwt.expiration=86400000

# Actuator and Monitoring
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Logging Configuration
logging.level.com.manabandhu=INFO
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# USCIS API Configuration
uscis.api.base-url=https://egov.uscis.gov
uscis.rate-limit.requests-per-minute=10

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
security.jwt.secret=${JWT_SECRET:change-me-change-me-change-me-change-me}
security.jwt.access-ttl-seconds=${JWT_ACCESS_TTL_SECONDS:3600}
security.jwt.refresh-ttl-seconds=${JWT_REFRESH_TTL_SECONDS:2592000}
