spring.application.name=manabandhu-backend
server.port=8080

spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.data.redis.url=${REDIS_URL:redis://localhost:6379}
spring.data.redis.ssl.enabled=true
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000

firebase.service-account=${FIREBASE_SERVICE_ACCOUNT:}

spring.cloud.gcp.enabled=true
spring.cloud.gcp.project-id=your-project-id
spring.cloud.gcp.credentials.location=file:./gcloud-service-key.json


jwt.secret=${JWT_SECRET:your-secret-key-change-this-in-production}
jwt.expiration=86400000

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

logging.level.com.manabandhu=INFO
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
