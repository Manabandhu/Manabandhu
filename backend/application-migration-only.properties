# Migration-only profile - Use this to run migrations without starting the web server
# Usage: java -jar app.jar --spring.profiles.active=migration-only
# Or: mvn spring-boot:run -Dspring-boot.run.profiles=migration-only

spring.application.name=manabandhu-backend

# Database configuration (same as main)
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# Disable web server - application will exit after migrations
spring.main.web-application-type=none

# Disable other services that aren't needed for migrations
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}
spring.cloud.gcp.enabled=false

# Minimal logging
logging.level.com.manabandhu=INFO
logging.level.org.flywaydb=INFO

