version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: manabandhu-postgres
    environment:
      POSTGRES_DB: manabandhu
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - manabandhu-network

  redis:
    image: redis:7-alpine
    container_name: manabandhu-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - manabandhu-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: manabandhu-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/manabandhu
      REDIS_URL: redis://redis:6379
    ports:
      - "9090:9090"
    depends_on:
      - postgres
      - redis
    networks:
      - manabandhu-network
    volumes:
      - ./backend/serviceAccountKey.json:/app/serviceAccountKey.json

volumes:
  postgres-data:
  redis-data:

networks:
  manabandhu-network:
    driver: bridge
